---
- name: Install Apache web server
  package:
    name: apache2
    state: present
  when: ansible_os_family == "Debian"

- name: Configure Apache index.html
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    mode: '0644'
  notify: restart apache

- name: Ensure Apache is enabled and running
  service:
    name: "{{ apache_service_name }}"
    state: started
    enabled: yes

- name: Open port 80 in firewall (Ubuntu/Debian)
  ufw:
    rule: allow
    port: 80
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Verify website is accessible
  uri:
    url: http://{{ ansible_host }}
    status_code: 200
  register: website_check
  until: website_check.status == 200
  retries: 5
  delay: 2
