---
- name: Update MOTD with IP and hostname
  hosts: all
  become: yes
  tasks:
    - name: Gather facts
      setup:

    - name: Get primary IP address
      set_fact:
        primary_ip: "{{ ansible_default_ipv4.address }}"

    - name: Create custom MOTD
      template:
        src: motd.j2
        dest: /etc/motd
        owner: root
        mode: '0644'
