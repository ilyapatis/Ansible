---
- name: Download and extract Apache Kafka
  hosts: all
  become: true
  vars:
    kafka_version: 4.2.0
    kafka_download_url: "https://www.apache.org/dyn/closer.lua/kafka/4.2.0/kafka-4.2.0-src.tgz?action=download"
    kafka_install_dir: /opt/kafka
    kafka_archive_name: "kafka_{{ kafka_version }}.tgz"

  tasks:
    - name: Create installation directory
      file:
        path: "{{ kafka_install_dir }}"
        state: directory
        mode: '0755'

    - name: Download Kafka archive
      get_url:
        url: "{{ kafka_download_url }}"
        dest: /tmp/{{ kafka_archive_name }}

    - name: Extract Kafka archive
      unarchive:
        src: /tmp/{{ kafka_archive_name }}
        dest: "{{ kafka_install_dir }}"
        remote_src: yes
        owner: root
        group: root

    - name: Clean up downloaded archive
      file:
        path: /tmp/{{ kafka_archive_name }}
        state: absent